<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>혈당스캐너 - NutriSort</title>
    <!-- 모바일 환경 최적화 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    
    <!-- PWA 설치 정보 (이게 진짜 핵심입니다) -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <!-- 기본 아이콘 -->
    <link rel="icon" type="image/png" href="./icon-192.png">

    <style>
        /* 화면 여백 없이 가득 차도록 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa; /* 앱 켜질 때 깜빡거리는 배경색 */
        }
        
        /* Streamlit 앱을 감싸는 투명한 프레임 설정 */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 로딩 애니메이션 */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            font-weight: bold;
            color: #86cc85;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loader">앱을 불러오는 중입니다...</div>
    
    <!-- embed=true 파라미터를 다시 추가하여 Streamlit 클라우드의 iframe 거부(보안/CORS)로 인한 무한 튕김 에러(sherr.streamlit.io)를 해결합니다. -->
    <iframe src="https://nutrisort.streamlit.app/?embed=true" onload="document.getElementById('loader').style.display='none';"></iframe>
    
    <!-- PWA 서비스 워커 등록 스크립트 -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js')
                .then(function(registration) {
                    console.log('앱 설치 모듈 정상 작동중!', registration.scope);
                })
                .catch(function(err) {
                    console.log('설치 모듈 에러: ', err);
                });
            });
        }
    </script>
</body>
</html>
