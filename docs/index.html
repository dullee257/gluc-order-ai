<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>혈당스캐너 - NutriSort</title>
    <!-- 모바일 환경 최적화 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    
    <!-- PWA 설치 정보 (이게 진짜 핵심입니다) -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <!-- 기본 아이콘 -->
    <link rel="icon" type="image/png" href="./icon-192.png">

    <style>
        /* 화면 여백 없이 가득 차도록 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa; /* 앱 켜질 때 깜빡거리는 배경색 */
        }
        
        /* Streamlit 앱을 감싸는 프레임 설정 */
        iframe {
            width: 100%;
            /* 🚀 [최종 병기] iframe 자체의 길이를 화면보다 길게 늘려서 맨 아랫부분(스트림릿 배너)을 화면 밖으로 밀어내버림 */
            height: calc(100% + 55px);
            border: none;
            display: block;
        }

        /* 로딩 애니메이션 */
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif;
            font-weight: bold;
            color: #86cc85;
            font-size: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="loader">앱을 불러오는 중입니다...</div>
    
    <!-- embed=true 파라미터를 다시 추가하여 Streamlit 클라우드의 iframe 거부(보안/CORS)로 인한 무한 튕김 에러(sherr.streamlit.io)를 해결합니다. -->
    <iframe src="https://gluc-order-ai-production.up.railway.app/?embed=true" onload="document.getElementById('loader').style.display='none';"></iframe>
    
    <!-- PWA 네이티브 설치 배너 및 로직 -->
    <div id="pwa-install-wrapper"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js')
                .then(function(registration) {
                    console.log('앱 설치 모듈 정상 작동중!', registration.scope);
                })
                .catch(function(err) {
                    console.log('설치 모듈 에러: ', err);
                });
            });
        }

        // PWA 설치 배너 로직 (최상단 창에서 실행되므로 네이티브 팝업 호출 지원 가능)
        setTimeout(function() {
            let isStandalone = false;
            if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) {
                isStandalone = true;
            } else if (navigator.standalone === true) {
                isStandalone = true;
            }
            if (isStandalone) return;

            const installWrapper = document.getElementById('pwa-install-wrapper');
            installWrapper.innerHTML = `
                <div id="pwa-install-banner" style="position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: #222222; color: #ffffff; padding: 12px 20px; border-radius: 30px; font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 10px; z-index: 99999; box-shadow: 0 5px 20px rgba(0,0,0,0.4); cursor: pointer; white-space: nowrap; border: 1px solid #444;">
                    <span style="font-size: 20px;">📲</span> 
                    <span>1초 만에 앱 설치하기</span>
                    <div id="pwa-close-btn" style="margin-left: 8px; width: 22px; height: 22px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 10px; font-weight: bold;">✕</div>
                </div>
                <div id="pwa-manual-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100000; justify-content: center; align-items: center;">
                    <div style="background: white; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                        <h3 id="pwa-modal-title" style="margin-top:0; color:#333; font-size:18px;">📱 앱 설치 가이드</h3>
                        <p id="pwa-modal-desc" style="text-align:left; color:#555; font-size:14px; line-height:1.7; margin-bottom:0;">
                            설치 방법을 안내해 드립니다.
                        </p>
                        <button id="pwa-modal-close" style="margin-top: 20px; width: 100%; background: #86cc85; color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;">확인</button>
                    </div>
                </div>
            `;
            
            const banner = document.getElementById('pwa-install-banner');
            const closeBtn = document.getElementById('pwa-close-btn');
            const manualModal = document.getElementById('pwa-manual-modal');
            const modalClose = document.getElementById('pwa-modal-close');
            const modalTitle = document.getElementById('pwa-modal-title');
            const modalDesc = document.getElementById('pwa-modal-desc');

            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
            });

            banner.addEventListener('click', async (e) => {
                if(e.target === closeBtn || closeBtn.contains(e.target)) {
                    banner.style.display = 'none';
                    return;
                }

                // 🌟 안드로이드 Chrome 등 네이티브 알림 지원 브라우저는 [즉시 자동 설치 팝업] 띄우기!
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    if (outcome === 'accepted') {
                        banner.style.display = 'none';
                    }
                } else {
                    // 네이티브 자동 설치 지원 안하는 브라우저 (iOS 사파리, 인앱 브라우저 등) 기기 감지
                    const ua = navigator.userAgent || navigator.vendor || window.opera;
                    
                    // --- 추가: 카카오톡, 네이버 등 인앱 브라우저 감지 시 솔직하고 명확한 안내 모달 출력 ---
                    if (ua.indexOf('KAKAOTALK') > -1 || ua.indexOf('NAVER') > -1 || ua.indexOf('Line') > -1 || ua.indexOf('Instagram') > -1 || ua.indexOf('FB') > -1) {
                        modalTitle.innerHTML = "🚨 현재 화면에서는 설치할 수 없습니다!";
                        modalDesc.innerHTML = "카톡 링크 등은 정책상 앱 설치가 진행되지 않습니다.<br><br><b>정상적인 설치를 원하시면 해당 주소를 복사하여 '문자 메시지(SMS)'로 전송받은 후, 문자 앱에서 링크를 클릭해 다시 접속해 주세요!</b>";
                        manualModal.style.display = 'flex';
                        return;
                    }

                    // --- 기존 환경별 설치 안내 모달 ---
                    let guideHTML = "";
                    if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                        modalTitle.innerHTML = "🍏 아이폰(iOS) 설치 방법";
                        guideHTML = "화면 하단 정중앙의 <b>공유 버튼(⍐)</b>을 누른 뒤<br><br><b>'홈 화면에 추가'</b>를 선택해 주세요!";
                    } else if (/android/i.test(ua)) {
                        modalTitle.innerHTML = "🤖 안드로이드 설치 방법";
                        guideHTML = "현재 환경(삼성인터넷 등)은 원클릭 자동 팝업을 지원하지 않습니다.<br><br>화면 상단의 점 3개(⋮)나 메뉴(≡)를 누르고 <b>'홈 화면에 추가'</b> 또는 <b>'앱 설치'</b>를 눌러 직접 설치가 가능합니다.";
                    } else {
                        modalTitle.innerHTML = "💻 PC / 기타 설치 방법";
                        guideHTML = "주소창 우측의 <b>(+) 설치 아이콘</b>이나 브라우저 메뉴에서 <b>앱 설치</b>를 눌러주세요.";
                    }
                    modalDesc.innerHTML = guideHTML;
                    manualModal.style.display = 'flex';
                }
            });

            modalClose.addEventListener('click', () => {
                manualModal.style.display = 'none';
            });

            window.addEventListener('appinstalled', () => {
                banner.style.display = 'none';
                manualModal.style.display = 'none';
            });
        }, 1500);
    </script>
</body>
</html>
