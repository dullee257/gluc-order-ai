# Streamlit Community Cloud 전용: 앱이 잠들지 않도록 "깨우기" 버튼 클릭
# Railway 사용 시 서버가 24시간 켜져 있으므로 자동 실행 비활성화됨 (수동 실행만 가능)
# Streamlit Cloud로 다시 전환할 때 schedule 주석 해제 후 푸시하면 1시간마다 자동 실행
name: Streamlit Keep-Alive

on:
  # schedule:
  #   - cron: '0 * * * *'   # Railway 사용 시 비활성화 (아래 workflow_dispatch만 사용)
  workflow_dispatch:        # 수동 실행만 (Actions 탭 → Run workflow)

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (Chromium only, with system deps for CI)
        run: npx playwright install --with-deps chromium

      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: npm run wake
