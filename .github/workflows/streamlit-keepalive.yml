# Streamlit Community Cloud 앱이 잠들지 않도록 주기적으로 "깨우기" 버튼 클릭
# 1시간마다 실행 (GitHub Pages 접속 시 수면 경고 최소화). URL 변경 시 Secrets에 STREAMLIT_APP_URL 설정
name: Streamlit Keep-Alive

on:
  schedule:
    - cron: '0 * * * *'     # 매시 정각 (1시간마다)
  workflow_dispatch:        # 수동 실행 가능

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers (Chromium only, with system deps for CI)
        run: npx playwright install --with-deps chromium

      - name: Wake Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: npm run wake
